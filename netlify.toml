[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' https://res.cloudinary.com https://images.unsplash.com data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self'; connect-src 'self' https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.cloudinary.com https://res.cloudinary.com https://api.flutterwave.com; frame-src 'self' https://res.cloudinary.com blob:; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.flutterwave.com; frame-ancestors 'none'; upgrade-insecure-requests"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
